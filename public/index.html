<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>API Playground — Test Client</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#11151f; --panel2:#161b27; --border:#222a3a;
    --text:#d7dce5; --muted:#7a849b; --accent:#5ee6a8; --accent2:#7aa2ff;
    --get:#5ee6a8; --post:#ffd166; --put:#7aa2ff; --del:#ff6b8a; --patch:#c792ea;
    --mono:'JetBrains Mono','SF Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--mono);background:var(--bg);color:var(--text);
    font-size:13px;height:100vh;display:flex;flex-direction:column}
  header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;
    align-items:center;gap:10px;background:var(--panel)}
  header .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 10px var(--accent)}
  header h1{font-size:14px;margin:0;font-weight:600;letter-spacing:.5px}
  header .tag{color:var(--muted);font-size:11px}
  .main{flex:1;display:flex;overflow:hidden}
  .sidebar{width:230px;border-right:1px solid var(--border);background:var(--panel);
    overflow-y:auto;padding:10px}
  .sidebar h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);margin:6px 4px}
  .hist-item{padding:8px;border-radius:6px;cursor:pointer;border:1px solid transparent;
    margin-bottom:4px}
  .hist-item:hover{background:var(--panel2);border-color:var(--border)}
  .hist-item .m{font-weight:700;font-size:10px}
  .hist-item .u{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis}
  .content{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .urlbar{display:flex;gap:8px;padding:12px;border-bottom:1px solid var(--border);
    background:var(--panel2)}
  select,input,textarea,button{font-family:var(--mono);font-size:13px}
  select.method{background:var(--panel);color:var(--accent);border:1px solid var(--border);
    border-radius:6px;padding:0 10px;font-weight:700;cursor:pointer}
  input.url{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;
    color:var(--text);padding:10px 12px}
  input.url:focus,textarea:focus{outline:none;border-color:var(--accent2)}
  button.send{background:var(--accent);color:#06281b;border:none;border-radius:6px;
    padding:0 22px;font-weight:700;cursor:pointer}
  button.send:hover{filter:brightness(1.1)}
  button.send:disabled{opacity:.5;cursor:wait}
  button.ghost{background:transparent;color:var(--muted);border:1px solid var(--border);
    border-radius:6px;padding:6px 12px;cursor:pointer}
  button.ghost:hover{color:var(--text);border-color:var(--accent2)}
  .tabs{display:flex;gap:2px;padding:0 12px;border-bottom:1px solid var(--border);
    background:var(--panel)}
  .tab{padding:10px 14px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;
    font-size:12px}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .panel-body{padding:12px;flex-shrink:0;max-height:34vh;overflow-y:auto}
  .kv-row{display:flex;gap:8px;margin-bottom:6px}
  .kv-row input{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:5px;
    color:var(--text);padding:7px 9px}
  .kv-row button{background:transparent;border:none;color:var(--del);cursor:pointer;font-size:16px}
  textarea.body{width:100%;min-height:120px;background:var(--panel2);border:1px solid var(--border);
    border-radius:6px;color:var(--text);padding:10px;resize:vertical;line-height:1.5}
  .body-types{display:flex;gap:6px;margin-bottom:8px}
  .body-types label{font-size:11px;color:var(--muted);cursor:pointer;padding:4px 8px;
    border:1px solid var(--border);border-radius:5px}
  .body-types input{display:none}
  .body-types input:checked + span{color:var(--accent)}
  .response{flex:1;display:flex;flex-direction:column;border-top:1px solid var(--border);
    overflow:hidden;background:var(--panel)}
  .resp-meta{display:flex;gap:16px;padding:10px 14px;border-bottom:1px solid var(--border);
    align-items:center;flex-wrap:wrap}
  .badge{padding:3px 10px;border-radius:5px;font-weight:700;font-size:12px}
  .meta-item{color:var(--muted);font-size:12px}
  .meta-item b{color:var(--text)}
  .resp-tabs{display:flex;gap:2px;padding:0 14px;border-bottom:1px solid var(--border)}
  pre.output{flex:1;margin:0;padding:14px;overflow:auto;background:var(--bg);
    line-height:1.6;tab-size:2}
  .empty{color:var(--muted);padding:40px;text-align:center}
  .json-key{color:var(--accent2)} .json-str{color:var(--accent)}
  .json-num{color:var(--post)} .json-bool{color:var(--patch)} .json-null{color:var(--muted)}
  .small{font-size:11px;color:var(--muted);margin-top:4px}
  .row-actions{display:flex;gap:6px;margin-top:8px}
  .config{font-size:11px;color:var(--muted);padding:8px 12px}
  .config input{background:var(--panel2);border:1px solid var(--border);border-radius:5px;
    color:var(--text);padding:5px 8px;width:100%;margin-top:4px}
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>API&nbsp;PLAYGROUND</h1>
  <span class="tag">// silent coder · backend test client</span>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="config">
      Backend URL
      <input id="backendUrl" value="" placeholder="http://localhost:4000" />
    </div>
    <h3>History</h3>
    <div id="history"></div>
    <button class="ghost" style="width:100%;margin-top:8px" onclick="clearHistory()">Clear history</button>
  </aside>

  <section class="content">
    <div class="urlbar">
      <select class="method" id="method">
        <option>GET</option><option>POST</option><option>PUT</option>
        <option>PATCH</option><option>DELETE</option><option>HEAD</option>
      </select>
      <input class="url" id="url" placeholder="https://jsonplaceholder.typicode.com/posts/1" />
      <button class="send" id="sendBtn" onclick="sendRequest()">SEND</button>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="params" onclick="switchTab('params')">Params</div>
      <div class="tab" data-tab="headers" onclick="switchTab('headers')">Headers</div>
      <div class="tab" data-tab="body" onclick="switchTab('body')">Body</div>
      <div class="tab" data-tab="code" onclick="switchTab('code')">Code</div>
    </div>

    <div class="panel-body">
      <div id="tab-params">
        <div id="paramsList"></div>
        <button class="ghost" onclick="addRow('paramsList')">+ Add param</button>
      </div>
      <div id="tab-headers" style="display:none">
        <div id="headersList"></div>
        <button class="ghost" onclick="addRow('headersList')">+ Add header</button>
      </div>
      <div id="tab-body" style="display:none">
        <div class="body-types">
          <label><input type="radio" name="bt" value="none" checked onchange="setBodyType()"><span>none</span></label>
          <label><input type="radio" name="bt" value="json" onchange="setBodyType()"><span>JSON</span></label>
          <label><input type="radio" name="bt" value="form" onchange="setBodyType()"><span>form</span></label>
          <label><input type="radio" name="bt" value="raw" onchange="setBodyType()"><span>raw</span></label>
        </div>
        <textarea class="body" id="bodyInput" placeholder='{ "title": "hello", "userId": 1 }'></textarea>
        <div class="small" id="bodyHint">No body for this request.</div>
      </div>
      <div id="tab-code" style="display:none">
        <div class="row-actions">
          <button class="ghost" onclick="genCode('curl')">cURL</button>
          <button class="ghost" onclick="genCode('fetch')">fetch</button>
          <button class="ghost" onclick="genCode('axios')">axios</button>
          <button class="ghost" onclick="copyCode()">copy</button>
        </div>
        <pre class="output" id="codeOut" style="max-height:200px;margin-top:8px;border:1px solid var(--border);border-radius:6px">// pick a language to generate code</pre>
      </div>
    </div>

    <div class="response">
      <div class="resp-meta" id="respMeta">
        <span class="meta-item">Response will appear here →</span>
      </div>
      <pre class="output" id="output"><div class="empty">Send a request to see the response.<br>Try GET https://jsonplaceholder.typicode.com/posts/1</div></pre>
    </div>
  </section>
</div>

<script>
// ---------- config / state ----------
const backendInput = document.getElementById('backendUrl');
backendInput.value = localStorage.getItem('backendUrl') || window.location.origin || 'http://localhost:4000';
backendInput.addEventListener('change', () => localStorage.setItem('backendUrl', backendInput.value));
function backend(){ return (backendInput.value || '').replace(/\/$/, ''); }

let bodyType = 'none';

// ---------- tabs ----------
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===name));
  ['params','headers','body','code'].forEach(n =>
    document.getElementById('tab-'+n).style.display = n===name ? 'block':'none');
}

// ---------- key/value rows ----------
function addRow(listId, k='', v=''){
  const div = document.createElement('div');
  div.className = 'kv-row';
  div.innerHTML = `<input placeholder="key" value="${k}"><input placeholder="value" value="${v}">
    <button onclick="this.parentElement.remove()">×</button>`;
  document.getElementById(listId).appendChild(div);
}
function collectRows(listId){
  const out = {};
  document.querySelectorAll(`#${listId} .kv-row`).forEach(r => {
    const [k,v] = r.querySelectorAll('input');
    if (k.value.trim()) out[k.value.trim()] = v.value;
  });
  return out;
}
addRow('paramsList'); addRow('headersList');

// ---------- body ----------
function setBodyType(){
  bodyType = document.querySelector('input[name="bt"]:checked').value;
  const hint = document.getElementById('bodyHint');
  document.getElementById('bodyInput').style.display = bodyType==='none' ? 'none':'block';
  hint.textContent = {
    none:'No body for this request.',
    json:'Enter valid JSON. Content-Type set automatically.',
    form:'Enter JSON pairs → sent as form-urlencoded.',
    raw:'Sent exactly as typed.'
  }[bodyType];
}

// ---------- build request object ----------
function buildRequest(){
  let body = document.getElementById('bodyInput').value;
  if (bodyType === 'json' || bodyType === 'form'){
    try { body = JSON.parse(body || '{}'); } catch(e){ /* send as-is, backend handles */ }
  }
  return {
    method: document.getElementById('method').value,
    url: document.getElementById('url').value.trim(),
    headers: collectRows('headersList'),
    params: collectRows('paramsList'),
    body, bodyType
  };
}

// ---------- send ----------
async function sendRequest(){
  const req = buildRequest();
  if (!req.url){ alert('Enter a URL'); return; }
  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = '...';
  const out = document.getElementById('output');
  const meta = document.getElementById('respMeta');
  out.innerHTML = '<div class="empty">Sending…</div>';

  try {
    const r = await fetch(backend() + '/api/proxy', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(req)
    });
    const data = await r.json();
    renderResponse(data);
    saveHistory(req, data);
  } catch(e){
    meta.innerHTML = `<span class="badge" style="background:var(--del);color:#fff">ERROR</span>`;
    out.textContent = 'Could not reach backend at ' + backend() +
      '\n\nIs the server running?  npm start\n\n' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'SEND';
  }
}

// ---------- render ----------
function statusColor(s){
  if (s>=200&&s<300) return 'var(--get)';
  if (s>=300&&s<400) return 'var(--put)';
  if (s>=400&&s<500) return 'var(--post)';
  return 'var(--del)';
}
function renderResponse(d){
  const meta = document.getElementById('respMeta');
  const out = document.getElementById('output');
  if (d.networkError){
    meta.innerHTML = `<span class="badge" style="background:var(--del);color:#fff">NETWORK</span>
      <span class="meta-item"><b>${d.statusText}</b></span>
      <span class="meta-item">${d.time} ms</span>`;
    out.textContent = d.message; return;
  }
  meta.innerHTML = `
    <span class="badge" style="background:${statusColor(d.status)};color:#06281b">${d.status} ${d.statusText||''}</span>
    <span class="meta-item">Time <b>${d.time} ms</b></span>
    <span class="meta-item">Size <b>${formatBytes(d.size)}</b></span>
    <span class="meta-item">${d.contentType||''}</span>`;
  const body = typeof d.data === 'object' ? JSON.stringify(d.data, null, 2) : String(d.data);
  out.innerHTML = highlight(body);
}
function formatBytes(b){
  if (b<1024) return b+' B';
  if (b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(2)+' MB';
}
function highlight(json){
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?/g, m =>
      `<span class="${/:$/.test(m)?'json-key':'json-str'}">${m}</span>`)
    .replace(/\b(true|false)\b/g,'<span class="json-bool">$1</span>')
    .replace(/\bnull\b/g,'<span class="json-null">null</span>')
    .replace(/(:\s*)(-?\d+\.?\d*)/g,'$1<span class="json-num">$2</span>');
}

// ---------- code generation ----------
async function genCode(lang){
  const req = buildRequest();
  if(!req.url){ alert('Enter a URL'); return; }
  const out = document.getElementById('codeOut');
  out.textContent = 'generating…';
  try{
    const r = await fetch(backend()+'/api/codegen', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(req)
    });
    const d = await r.json();
    out.textContent = d[lang] || d.error || 'no output';
  }catch(e){ out.textContent = 'Backend unreachable: '+e.message; }
}
function copyCode(){
  navigator.clipboard.writeText(document.getElementById('codeOut').textContent);
}

// ---------- history (localStorage) ----------
function saveHistory(req, res){
  const hist = JSON.parse(localStorage.getItem('apiHistory')||'[]');
  hist.unshift({ method:req.method, url:req.url, status:res.status,
    req, ts:Date.now() });
  localStorage.setItem('apiHistory', JSON.stringify(hist.slice(0,25)));
  renderHistory();
}
function renderHistory(){
  const hist = JSON.parse(localStorage.getItem('apiHistory')||'[]');
  const el = document.getElementById('history');
  el.innerHTML = hist.map((h,i)=>`
    <div class="hist-item" onclick="loadHistory(${i})">
      <div class="m" style="color:${methodColor(h.method)}">${h.method}</div>
      <div class="u">${h.url}</div>
    </div>`).join('') || '<div class="small" style="padding:4px">No requests yet.</div>';
}
function methodColor(m){
  return {GET:'var(--get)',POST:'var(--post)',PUT:'var(--put)',
    DELETE:'var(--del)',PATCH:'var(--patch)'}[m] || 'var(--text)';
}
function loadHistory(i){
  const h = JSON.parse(localStorage.getItem('apiHistory')||'[]')[i];
  if(!h) return;
  document.getElementById('method').value = h.req.method;
  document.getElementById('url').value = h.req.url;
  // restore params/headers
  ['paramsList','headersList'].forEach(id=>document.getElementById(id).innerHTML='');
  Object.entries(h.req.params||{}).forEach(([k,v])=>addRow('paramsList',k,v));
  Object.entries(h.req.headers||{}).forEach(([k,v])=>addRow('headersList',k,v));
  if(!Object.keys(h.req.params||{}).length) addRow('paramsList');
  if(!Object.keys(h.req.headers||{}).length) addRow('headersList');
}
function clearHistory(){ localStorage.removeItem('apiHistory'); renderHistory(); }
renderHistory();
</script>
</body>
</html>
